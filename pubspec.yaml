name: togetherirl
description: Group hangout planner app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Supabase (auth + database)
  supabase_flutter: ^2.8.4

  # HTTP client for backend API calls
  http: ^1.2.0

  # Image picker (receipt scanning)
  image_picker: ^1.1.2

  # Icons
  cupertino_icons: ^1.0.6

  # Network images
  cached_network_image: ^3.3.1

  # UI utilities
  flutter_staggered_grid_view: ^0.7.0
  table_calendar: ^3.2.0
  livekit_client: ^2.7.0
  permission_handler: ^12.0.1
  http: ^1.6.0
  socket_io_client: ^3.1.4
  vibration: ^3.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
